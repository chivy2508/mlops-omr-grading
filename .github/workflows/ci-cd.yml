name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-code:
    name: CI - Code lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install flake8
        run: pip install flake8
      - name: Lint (only fatal errors)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  lint-dockerfile:
    name: CI - Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  security-scan:
    name: CI - Security scan (trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

  deploy:
    name: CD - Deploy to server
    needs: [lint-code, lint-dockerfile, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd ~/mlops_project
          git fetch origin
          git reset --hard origin/main

      - name: Rebuild & restart API + monitor
        run: |
          cd ~/mlops_project
          docker compose stop omr_api monitor || true
          docker compose rm -f omr_api monitor || true
          docker compose up -d --build omr_api monitor

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            if curl -fsS http://localhost:8001/docs >/dev/null; then
              echo "API is up on :8001"
              exit 0
            fi
            echo "waiting... ($i)"
            sleep 5
          done
          echo "API did not respond"
          docker logs omr_engine --tail 50 || true
          exit 1