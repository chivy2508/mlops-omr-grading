stages:
  stages:
  # Bước 1: Trộn ảnh cũ + ảnh mới khách hàng vừa sửa
  split_dataset:
    cmd: python src/integrate_feedback.py
    deps:
      - src/integrate_feedback.py
      - retrain_dataset/
      - data/raw/
    outs:
      - data/processed/

  # Bước 2: Bắt đầu Train mô hình mới
  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed/train/

    outs:
      - models/OMR_Grading_Engine.pth

  # Bước 3: Đánh giá mô hình (Phải tốt hơn thì mới lên sóng)
  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - models/OMR_Grading_Engine.pth
      - data/processed/test/
      
    metrics:
      - metrics.json:
          cache: false
