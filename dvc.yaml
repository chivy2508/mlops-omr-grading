stages:
  generate_template:
    cmd: python src/generate_template_json.py
    deps:
      - src/generate_template_json.py
    outs:
      - data/template_config.json

  split_data:
    cmd: python src/split_data.py
    deps:
      - src/split_data.py
      - data/labels.csv
      - data/feedback_labels.csv
      - data/synthetic_images/
    outs:
      - data/processed/train.csv
      - data/processed/val.csv
      - data/processed/test.csv
      
  crop_bubbles:
    cmd: python src/crop_bubbles.py
    deps:
      - src/crop_bubbles.py
      - data/template_config.json
      - data/synthetic_images/
      - data/processed/
    outs:
      - data/bubbles/

  train:
    cmd: python src/train.py
    deps:
      - config/config.yaml
      - src/train.py
      - data/bubbles/train/ 
      - data/bubbles/val/
    outs:
      - best_model.pth:
          desc: "Trained model checkpoint"

  # Bước 3: Đánh giá mô hình (Phải tốt hơn thì mới lên sóng)
  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - best_model.pth
      - data/bubbles/test/   
    metrics:
      - metrics.json:
          cache: false
