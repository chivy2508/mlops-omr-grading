stages:
  stages:
  # Bước 1: Trộn ảnh cũ + ảnh mới khách hàng vừa sửa
  split_dataset:
    cmd: python src/integrate_feedback.py
    deps:
      - src/integrate_feedback.py
      - retrain_dataset/
      - data/raw/
    outs:
      - data/processed/

  crop_bubbles:
    cmd: python src/crop_bubbles.py
    deps:
      - src/crop_bubbles.py
      - data/processed/  # Chờ file CSV từ Bước 1
      - data/synthetic_images/ # Ảnh gốc để cắt
    outs:
      - data/bubbles/

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/bubbles/train/  # Đã đổi: Model giờ chỉ ăn ảnh 32x32 thay vì ảnh to
      - data/bubbles/val/
    outs:
      - best_model.pth

  # Bước 3: Đánh giá mô hình (Phải tốt hơn thì mới lên sóng)
  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - best_model.pth
      - data/bubbles/test/   
    metrics:
      - metrics.json:
          cache: false
