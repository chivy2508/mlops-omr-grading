model:
  batch_size: 256           
  epochs: 20               
  learning_rate: 0.001     
  patience: 5              
  weight_decay: 0.00001    
  dropout: 0.2             
  class_weight_0: 1.0     
  class_weight_1: 3.0      
  num_workers: 4           

preprocessing:
  image_size: 32
  blur_threshold: 25
  brightness_min: 40
  brightness_max: 220